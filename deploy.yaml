# Descriptor for the "rig" vehicle-level orchestrator: how to invoke this service's per-sensor
# launcher. Descriptive metadata ONLY -- this repo does not depend on rig, and rig depends on
# this repo (one-way). rig invokes:  <launcher> <config> <mapped-verb>   e.g.  gige-up <config> up -d
service: gige-vision
launcher: gige-up
verbs:
  up: "up -d"
  down: "down"
  status: "ps"       # rig may append `--format json` to parse `docker compose ps`
  logs: "logs"
  config: "config"
ros_distro: lyrical

launch_surface:                          # the files rig copies to the vehicle (NOT the source/build context)
  - gige-up
  - tools/sensor_env.py
  - docker-compose.yml
  - docker-compose.dev.yml
  - docker-compose.external-config.yml
  - plugins/ros2-bridge/compose.yml
  - plugins/webrtc-bridge/compose.yml

external_volumes:                        # rig removes these only on FINAL teardown (`rig down --purge`),
  - "gige_{name}_sock"                   #   never on a restart; {name} is the instance name
