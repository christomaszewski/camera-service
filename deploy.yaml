# Descriptor for the "rig" vehicle-level orchestrator: how to invoke this service's per-sensor
# launcher. Descriptive metadata ONLY -- this repo does not depend on rig, and rig depends on
# this repo (one-way). rig invokes:  <launcher> <config> <mapped-verb>   e.g.  gige-up <config> up -d
service: gige-vision
launcher: gige-up
verbs:
  up: "up -d"
  down: "down"
  status: "ps"       # rig may append `--format json` to parse `docker compose ps`
  logs: "logs"
  config: "config"
ros_distro: lyrical

platform:                                # JP6 vs JP7 is a HOST fact; gige-up auto-detects it per host
  auto_detect: /etc/nv_tegra_release     #   R36 -> jp6 (l4t + nvidia runtime); R38+ -> jp7 (runc + CDI)
  override_env: GIGE_PLATFORM            #   rig may set this per host to {jp6|jp7} to pin instead of detect

images:                                  # pull-based deploy: gige-up points images at a registry (docs/deploy-without-rig.md)
  registry_env: GIGE_REGISTRY            #   set -> <registry>/<name>:<platform> for every image; then `pull` + `up`
  tag_env: GIGE_IMAGE_TAG                #   default tag = detected platform (jp6/jp7); set to pin a release
  per_image_env: [GIGE_CORE_IMAGE, GIGE_ROS2_IMAGE, GIGE_WEBRTC_IMAGE]   # override a single image

launch_surface:                          # the files rig copies to the vehicle (NOT the source/build context)
  - gige-up
  - tools/sensor_env.py
  - docker-compose.yml
  - docker-compose.dev.yml
  - docker-compose.external-config.yml
  - docker-compose.jp7.yml                # the JP7 (runc + CDI NVENC) overlay; gige-up applies it per host
  - plugins/ros2-bridge/compose.yml
  - plugins/webrtc-bridge/compose.yml

external_volumes:                        # rig removes these only on FINAL teardown (`rig down --purge`),
  - "gige_{name}_sock"                   #   never on a restart; {name} is the instance name
