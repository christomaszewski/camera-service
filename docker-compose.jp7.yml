# JetPack 7 override (applied by `cam-up --jp7`). JP7 replaced JP6's CSV-mount model with CDI,
# so containers get the NVIDIA multimedia stack (nvv4l2*/nvvidconv/NvBufSurface/nvunixfd + the
# /dev/v4l2-nvenc|nvdec nodes) via a CDI device, NOT via `runtime: nvidia`.
#
# Prereq on the host (once):  sudo nvidia-ctk cdi generate --output=/etc/cdi/nvidia.yaml
# Build the core on a 24.04 base:  CAM_CORE_BASE=ubuntu:24.04 (CUDA base only if you need CUDA).
# `kmod` is baked into the core + webrtc-bridge images (libnvtvmr runs lsmod during NVENC init).
services:
  core-driver:
    runtime: runc                 # CDI is handled by Docker's native --device, not the nvidia runtime
    devices:
      - nvidia.com/gpu=all
  # Same grant for the webrtc bridge -- it's what makes nvv4l2h264enc exist in that container, so the
  # sensor yaml's GST_PLUGIN_FEATURE_RANK can actually steer webrtcsink onto HW NVENC (webrtcsink
  # inserts the nvvidconv->NVMM hop itself for nvv4l2* encoders). The CDI-injected plugins are built
  # against the host's GStreamer 1.24 == this 24.04 image's GStreamer, so they load cleanly.
  # Validated end-to-end on an R39 AGX Orin (webrtcsink picked nvv4l2h264enc; webrtcsrc decoded).
  webrtc-bridge:
    runtime: runc
    devices:
      - nvidia.com/gpu=all
