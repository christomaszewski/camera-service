# Test config: FAKE USB COLOR source (videotestsrc I420, no /dev/video device).
#
# Exercises the color path end to end: a 4:2:0 (I420) source -> shared pipeline -> recorder.
# `encoder: auto` resolves to FFV1 for color (lossless, no chroma resample); the recording must
# decode back as I420 (NOT NV24/GRAY8), proving the format flowed without a fidelity-breaking convert.
camera:
  type: usb
  frame_rate: 25.0

usb:
  fake: true
  pixel_format: I420            # 4:2:0 color
  width: 512
  height: 512

recording:
  enabled: true
  encoder: auto                 # color -> ffv1 (lossless, native subsampling)
  output_dir: /data/recordings
  name_prefix: usbcolor
  segment_seconds: 30

preview:
  enabled: false

transport:
  plugin_endpoint:
    enabled: true
    socket_path: /tmp/cam/frames
  raw_endpoint:
    enabled: false
    socket_path: /tmp/cam/raw

plugins: []
