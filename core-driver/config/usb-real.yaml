# REAL USB/UVC camera (not the videotestsrc fake). A NexiGo HD Webcam on /dev/video0 delivering
# MJPEG -> stream-copy the delivered JPEG (faithful) + decode I420 for consumers. (The cam also
# offers YUY2 raw at lower res -- see usb-real-raw.yaml -- which records via FFV1.)
camera:
  type: usb
  frame_rate: 30.0              # general (the recorder + the v4l2 capture rate)

usb:
  device: /dev/video0          # prefer a stable /dev/v4l/by-id/... path so hotplug reconnects the same cam
  fake: false
  pixel_format: MJPEG           # NexiGo offers MJPEG up to 1080p60 + YUY2 raw at lower res
  width: 1280
  height: 720
  sof_timestamps: true          # use the v4l2 driver per-frame ts (this cam stamps at dequeue ~= arrival;
  #                               a start-of-exposure cam would gain -- the delta shows in the sidecar)

recording:
  enabled: true
  encoder: auto                 # encoded -> stream-copy (the delivered JPEG, no re-encode)
  output_dir: /data/recordings
  name_prefix: usbmjpeg
  segment_seconds: 30

preview:
  enabled: false

transport:
  plugin_endpoint:
    enabled: true               # carries the DECODED I420 to consumers
    socket_path: /tmp/cam/frames
  raw_endpoint:
    enabled: false
    socket_path: /tmp/cam/raw

plugins: []
