# REAL RTSP camera (not the fake server): an H.265 1280x720@30 device on the LAN. Exercises the
# RtspSource against actual hardware -- real H.265 GOP structure through stream-copy + real RTCP->NTP
# wall-clock provenance (on gst>=1.24). protocols=tcp forces RTP-over-TCP (needed through Docker
# Desktop's NAT, where inbound UDP RTP doesn't reach the container; also handy on firewalled nets).
source:
  type: rtsp

rtsp:
  url: rtsp://192.168.6.100:8554/main.264
  codec: h265                   # the URL says .264 but the stream is actually HEVC (probed)
  protocols: tcp
  latency_ms: 200
  width: 1280
  height: 720
  frame_rate: 30.0

recording:
  enabled: true
  encoder: auto                 # encoded -> stream-copy (the delivered H.265 bitstream, no re-encode)
  output_dir: /data/recordings
  name_prefix: rtsphevc
  segment_seconds: 30

preview:
  enabled: false

transport:
  plugin_endpoint:
    enabled: true               # carries the DECODED I420 to consumers
    socket_path: /tmp/cam/frames
  raw_endpoint:
    enabled: false
    socket_path: /tmp/cam/raw

plugins: []
