# REAL RTSP camera (not the fake server) -- e.g. the SIYI ZR30 on the LAN. The RtspSource PROBES the
# live stream at startup (gst-discoverer) for codec + resolution + framerate, so you DON'T pin them
# here: the camera can switch codec/res (this one has run H.265 720p and H.264 4K) and it just works.
# protocols=tcp forces RTP-over-TCP (needed through Docker Desktop's NAT; also handy on firewalled nets).
source:
  type: rtsp

rtsp:
  url: rtsp://192.168.6.100:8554/main.264
  protocols: tcp
  latency_ms: 200
  # codec/width/height are auto-probed (probe: true by default). To override, set them + probe: false.

recording:
  enabled: true
  encoder: auto                 # encoded -> stream-copy (the delivered bitstream, no re-encode)
  output_dir: /data/recordings
  name_prefix: rtsprec
  segment_seconds: 30

preview:
  enabled: false

transport:
  plugin_endpoint:
    enabled: true               # carries the DECODED I420 to consumers
    socket_path: /tmp/cam/frames
  raw_endpoint:
    enabled: false
    socket_path: /tmp/cam/raw

plugins: []
