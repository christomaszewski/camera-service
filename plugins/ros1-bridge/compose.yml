# ros1-bridge — heavy plugin, runs as its own container (ROS 1 Noetic). The ROS 1 mirror of ros2-bridge,
# pulled into the per-sensor stack via the top-level `include:`, activated only when the `ros1-bridge`
# profile is enabled. ROS 1 reads the shm + 36-byte header transport (GStreamer 1.16 has no unixfd), so
# it pairs with a JP6-class core (the JP6 image also runs on a JP7 host, sans HW NVENC).
#
# Note: with `include`, relative paths resolve relative to THIS file's directory (context climbs to ../..).
services:
  ros1-bridge:
    profiles: ["ros1-bridge"]
    image: ${GIGE_ROS1_IMAGE:-${RIG_IMAGE_REGISTRY:+${RIG_IMAGE_REGISTRY}/}ros1-bridge}  # rig: RIG_IMAGE_REGISTRY
    build:
      context: ../..
      dockerfile: plugins/ros1-bridge/Dockerfile
    init: true
    network_mode: ${GIGE_NETWORK:-host}     # host = join the host ROS 1 graph (TCPROS + the shared roscore)
    ipc: host                               # REQUIRED: the shm transport data lives in /dev/shm
    volumes:
      - gige_sock:/tmp/gige
    environment:
      # ROS 1 reads the shm + 36-byte header transport (no unixfd in GStreamer 1.16) -> JP6-class core.
      - GIGE_TRANSPORT_SOCKET=${GIGE_TRANSPORT_SOCKET:-/tmp/gige/frames}
      # Per-sensor identity (sensor_env derives these from the config): ROS namespace, topic, frame_id.
      - GIGE_INSTANCE=${GIGE_INSTANCE:-camera}
      - GIGE_ROS_TOPIC=${GIGE_ROS_TOPIC:-image_raw}
      - GIGE_FRAME_ID=${GIGE_FRAME_ID:-camera}
      # Bayer color: GIGE_ROS_ENCODING labels a mosaic (e.g. bayer_rggb8); '' = mono. GIGE_DEBAYER=true
      # makes the launch run a ROS 1 image_proc/debayer nodelet -> <ns>/image_color.
      - GIGE_ROS_ENCODING=${GIGE_ROS_ENCODING:-}
      - GIGE_DEBAYER=${GIGE_DEBAYER:-false}
      # ROS 1 master: the shared host roscore (tools/roscore.sh / gige-up --roscore). Defaults to localhost
      # over host networking. Set ROS_IP/ROS_HOSTNAME to the host's address for off-board consumers.
      - ROS_MASTER_URI=${ROS_MASTER_URI:-http://localhost:11311}
    command: ["roslaunch", "gige_ros1_bridge", "bridge.launch"]
    depends_on:
      - core-driver
    restart: unless-stopped

volumes:
  gige_sock:
    external: true
    name: ${GIGE_SOCK_VOLUME:-gige_sock}
