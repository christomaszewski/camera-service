# ros2-bridge — heavy plugin, runs as its own container (ROS2/DDS on a Lyrical Luth LTS base).
# Pulled into the per-sensor stack by the top-level docker-compose.yml via `include:`, and
# activated only when the `ros2-bridge` profile is enabled (gige-up derives the profile set
# from the sensor config's enabled `isolation: container` plugins).
#
# Note: with `include`, relative paths here resolve relative to THIS file's directory, so the
# build context climbs to the repo root (../..).
services:
  ros2-bridge:
    profiles: ["ros2-bridge"]
    image: ${GIGE_ROS2_IMAGE:-ros2-bridge}     # registry tag for pull-based deploys (gige-up sets it from GIGE_REGISTRY)
    build:
      context: ../..
      dockerfile: plugins/ros2-bridge/Dockerfile
    init: true
    network_mode: ${GIGE_NETWORK:-host}     # host = join the host ROS2 graph
    ipc: host                               # share /dev/shm with the core
    volumes:
      - gige_sock:/tmp/gige
    environment:
      # Bayer color: sensor_env derives these from the camera pixel_format + the plugin's `debayer`
      # param. GIGE_ROS_ENCODING labels a mosaic stream (e.g. bayer_rggb8) so image_proc can debayer
      # downstream (option A; '' = mono, derived from the header). GIGE_DEBAYER=true makes the bridge
      # demosaic to rgb8 in-process (option B). The bridge reads both as parameter defaults.
      - GIGE_ROS_ENCODING=${GIGE_ROS_ENCODING:-}
      - GIGE_DEBAYER=${GIGE_DEBAYER:-false}
      # Join the vehicle-wide DDS graph. `rig` exports these before calling gige-up so every
      # stack shares one graph; the defaults are also correct standalone (gige joins whatever
      # domain the host sets). rmw_fastrtps_cpp is the ROS 2 default RMW, in ros-base already.
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - RMW_IMPLEMENTATION=${RMW_IMPLEMENTATION:-rmw_fastrtps_cpp}
    # __ns namespaces the node per sensor, so topics land under /<instance>/...
    command: >
      ros2 run gige_ros2_bridge gige_ros2_bridge --ros-args
      -r __ns:=/${GIGE_INSTANCE:-camera}
      -p socket_path:=/tmp/gige/frames
      -p topic:=${GIGE_ROS_TOPIC:-image_raw}
      -p frame_id:=${GIGE_FRAME_ID:-camera}
    depends_on:
      - core-driver
    restart: unless-stopped

volumes:
  gige_sock:
    external: true
    name: ${GIGE_SOCK_VOLUME:-gige_sock}
