# webrtc-bridge — heavy plugin, runs as its own container (gst-plugins-rs webrtcsink, built
# from source). Pulled into the per-sensor stack via the top-level `include:`, activated only
# when the `webrtc-bridge` profile is enabled. Transport mirrors the ros2 bridge (unixfd on JP7,
# raw shm on JP6); port comes from the sensor config (host networking -> a distinct port per sensor).
services:
  webrtc-bridge:
    profiles: ["webrtc-bridge"]
    image: ${CAM_WEBRTC_IMAGE:-${RIG_IMAGE_REGISTRY:+${RIG_IMAGE_REGISTRY}/}webrtc-bridge:${RIG_IMAGE_TAG:-latest}}  # rig: RIG_IMAGE_REGISTRY + RIG_IMAGE_TAG; standalone: cam-up sets CAM_WEBRTC_IMAGE from CAM_REGISTRY
    build:
      context: ../..
      dockerfile: plugins/webrtc-bridge/Dockerfile
    init: true
    network_mode: ${CAM_NETWORK:-host}     # host = expose signalling + WebRTC media to viewers
    ipc: host                               # share /dev/shm with the core (JP6 raw endpoint; harmless for unixfd)
    volumes:
      - cam_sock:/tmp/cam
    environment:
      # Transport selection (mirrors the ros2 bridge; must match the core): unixfd on JP7 (rides the
      # core's plugin_endpoint /tmp/cam/unixfd -- shared with the ros2 bridge, unixfdsink broadcasts),
      # raw shm on JP6 (/tmp/cam/raw, needs transport.raw_endpoint.enabled). cam-up exports
      # CAM_PLATFORM; CAM_TRANSPORT ({unixfd|shm}) overrides.
      - CAM_PLATFORM=${CAM_PLATFORM:-jp6}
      - CAM_TRANSPORT=${CAM_TRANSPORT:-}
      - CAM_TRANSPORT_SOCKET=${CAM_TRANSPORT_SOCKET:-/tmp/cam/unixfd}
      - CAM_SHM_SOCKET=${CAM_SHM_SOCKET:-/tmp/cam/raw}
      # Bayer color: sensor_env derives the pattern from the camera pixel_format. Non-empty -> webrtc
      # debayers the CFA preview to color (bayer2rgb); '' = mono. CAM_WEBRTC_DEBAYER=false forces the
      # raw mosaic. On JP7 the unixfd caps carry the pattern; on JP6 raw-shm run.sh applies it.
      - CAM_BAYER=${CAM_BAYER:-}
      - CAM_WEBRTC_DEBAYER=${CAM_WEBRTC_DEBAYER:-auto}
      # JP6 raw shm carries no caps -> geometry from the sensor config (must match the camera frame).
      # Ignored on JP7 (unixfd caps are self-describing).
      - CAM_WIDTH=${CAM_WIDTH:-512}
      - CAM_HEIGHT=${CAM_HEIGHT:-512}
      - CAM_FORMAT=${CAM_FORMAT:-GRAY8}
      - CAM_FPS=${CAM_FPS:-25}
      - SIGNALLING_PORT=${CAM_SIGNALLING_PORT:-8443}
      # Fleet discovery (docs/DISCOVERY.md): once streaming, the bridge advertises this stream over
      # Zenoh at fleet/<VEHICLE_ID>/media/<CAM_INSTANCE> -- a liveliness token (presence) + a queryable
      # (JSON descriptor). Best-effort + additive: CAM_ADVERTISE=0 (or CAM_LAUNCHER=gst-launch) turns
      # it off and the video path is untouched. VEHICLE_ID empty -> the container hostname.
      - CAM_INSTANCE=${CAM_INSTANCE:-camera}
      - VEHICLE_ID=${VEHICLE_ID:-}
      - ZENOH_CONNECT=${ZENOH_CONNECT:-tcp/localhost:7447}   # the vehicle's local zenohd; set empty to scout
      - CAM_ADVERTISE=${CAM_ADVERTISE:-1}
      - CAM_LAUNCHER=${CAM_LAUNCHER:-}
      - CAM_PRODUCER_ID=${CAM_PRODUCER_ID:-}              # default <vehicle>-<sensor>; == webrtcsink meta.name
      - CAM_STREAM_ROLE=${CAM_STREAM_ROLE:-}              # human label; default = sensor id
      - CAM_SIGNALLING_URL=${CAM_SIGNALLING_URL:-}        # full override; else <scheme>://<host>:<port>
      - CAM_SIGNALLING_HOST=${CAM_SIGNALLING_HOST:-}      # default = hostname (reachability is deployment's job)
      - CAM_SIGNALLING_SCHEME=${CAM_SIGNALLING_SCHEME:-ws}
      - CAM_SIGNALLING_PROTOCOL=${CAM_SIGNALLING_PROTOCOL:-gstwebrtc-api}
      - CAM_ROS_TOPIC=${CAM_ROS_TOPIC:-}                  # OPTIONAL linkage if a ros bridge coexists
      - CAM_RECORDING_GLOB=${CAM_RECORDING_GLOB:-}        # OPTIONAL recording linkage
      - VIDEO_CAPS=${VIDEO_CAPS:-}                          # pin a codec (e.g. video/x-h264) -> descriptor hint
      # Adaptive bitrate: webrtcsink runs Google Congestion Control (gcc) and scales the encoder bitrate
      # to each viewer's link automatically. These OPTIONAL bounds (bit/sec) frame that range; the element
      # default max is 8 Mbps, which caps quality at high res -> set CAM_WEBRTC_MAX_BITRATE (e.g. 20000000)
      # for 4K. CAM_WEBRTC_CONGESTION = gcc|homegrown|disabled (default gcc).
      - CAM_WEBRTC_MIN_BITRATE=${CAM_WEBRTC_MIN_BITRATE:-}
      - CAM_WEBRTC_MAX_BITRATE=${CAM_WEBRTC_MAX_BITRATE:-}
      - CAM_WEBRTC_START_BITRATE=${CAM_WEBRTC_START_BITRATE:-}
      - CAM_WEBRTC_CONGESTION=${CAM_WEBRTC_CONGESTION:-}
    command: ["bash", "run.sh"]
    depends_on:
      - core-driver
    restart: unless-stopped

volumes:
  cam_sock:
    external: true
    name: ${CAM_SOCK_VOLUME:-cam_sock}
