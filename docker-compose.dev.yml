# Dev override (no Jetson) — applied by `cam-up --dev`. Runs the core from the cam-dev image
# (Ubuntu + GStreamer + Aravis, NO NVIDIA stack) instead of the l4t image, with the source
# mounted for live iteration. The heavy plugins (ros2-bridge / webrtc-bridge) aren't l4t images,
# so they run unchanged from their normal definitions. cam-up --dev also sets CAM_NETWORK=bridge.
services:
  core-driver:
    image: ${RIG_IMAGE_REGISTRY:+${RIG_IMAGE_REGISTRY}/}cam-dev:${RIG_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: core-driver/Dockerfile.dev
    runtime: runc                       # no nvidia runtime on a laptop / CI
    entrypoint: ["python3"]             # cam-dev's default CMD is main.py; force the supervisor
    command: ["supervisor.py"]
    volumes:
      - ./core-driver:/app              # cam-dev expects the code mounted (live edits, no rebuild)
