# Per-sensor stack — ONE config drives ONE sensor. Don't run this directly; run `./gige-up
# <sensor-config>`, which reads the config (the single source of truth), turns its enabled
# `isolation: container` plugins into COMPOSE_PROFILES, and parameterizes the stack below.
#
# Each heavy plugin lives in its own plugins/<x>/compose.yml and is pulled in via `include:`;
# the active set is chosen by profiles, so adding a plugin to a sensor = flipping it on in the
# config, not editing this file. Multiple cameras = the same files run as multiple projects
# (gige-up sets COMPOSE_PROJECT_NAME / the socket volume / ports per sensor).
#
# The shm transport is a stable EXTERNAL named volume (${GIGE_SOCK_VOLUME}) + ipc:host, so other
# sensor or autonomy stacks attach to a sensor's frames by mounting that volume + --ipc=host —
# it is not scoped to this compose project.
#
# Requires Docker Compose >= 2.20 (the `include:` element) — the v2 `docker compose` plugin.
include:
  - plugins/ros2-bridge/compose.yml
  - plugins/webrtc-bridge/compose.yml

services:
  core-driver:
    image: gige-core
    build:
      context: .
      dockerfile: core-driver/Dockerfile
      args:
        L4T_TAG: r36.4.0
    init: true                          # tini reaps orphans; the supervisor manages its children
    network_mode: ${GIGE_NETWORK:-host} # GigE Vision broadcast discovery needs host networking
    ipc: host                           # publish /dev/shm so consumers can read the transport
    runtime: nvidia
    command: ["supervisor.py"]          # reads GIGE_CONFIG; spawns core + in-image (process) plugins
    volumes:
      - ./core-driver/config:/app/config:ro
      - ./recordings:/data/recordings
      - gige_sock:/tmp/gige
    environment:
      - GIGE_CONFIG=${GIGE_CONFIG:-config/sensors/camera.yaml}
    restart: unless-stopped

volumes:
  gige_sock:
    external: true                      # created by gige-up so it has a stable cross-stack name
    name: ${GIGE_SOCK_VOLUME:-gige_sock}
