# Per-sensor stack — ONE config drives ONE sensor. Don't run this directly; run `./cam-up
# <sensor-config>`, which reads the config (the single source of truth), turns its enabled
# `isolation: container` plugins into COMPOSE_PROFILES, and parameterizes the stack below.
#
# Each heavy plugin lives in its own plugins/<x>/compose.yml and is pulled in via `include:`;
# the active set is chosen by profiles, so adding a plugin to a sensor = flipping it on in the
# config, not editing this file. Multiple cameras = the same files run as multiple projects
# (cam-up sets COMPOSE_PROJECT_NAME / the socket volume / ports per sensor).
#
# The shm transport is a stable EXTERNAL named volume (${CAM_SOCK_VOLUME}) + ipc:host, so other
# sensor or autonomy stacks attach to a sensor's frames by mounting that volume + --ipc=host —
# it is not scoped to this compose project.
#
# Requires Docker Compose >= 2.20 (the `include:` element) — the v2 `docker compose` plugin.
include:
  - plugins/ros2-bridge/compose.yml
  - plugins/ros1-bridge/compose.yml
  - plugins/webrtc-bridge/compose.yml

services:
  core-driver:
    # cam-up auto-detects the host (JP6/JP7) and sets CAM_CORE_BASE to match; CAM_CORE_IMAGE lets
    # pull-based deploys point at a per-platform registry tag (e.g. registry/cam-core:jp7). When rig
    # injects RIG_IMAGE_REGISTRY + RIG_IMAGE_TAG, the fleet registry's <tag> image is pulled
    # (RIG_IMAGE_TAG = vehicle.yaml images.tag, e.g. jp7); CAM_CORE_IMAGE still wins.
    image: ${CAM_CORE_IMAGE:-${RIG_IMAGE_REGISTRY:+${RIG_IMAGE_REGISTRY}/}cam-core:${RIG_IMAGE_TAG:-latest}}
    build:
      context: .
      dockerfile: core-driver/Dockerfile
      args:
        # JP6 default = the slim l4t-base (NOT l4t-jetpack -- we use no CUDA SDK, so the full ~14 GB
        # JetPack base is pure waste). On a JP7 host cam-up sets this to ubuntu:24.04. NVENC is
        # injected at runtime (CSV on JP6, CDI on JP7), so no CUDA base is ever needed.
        BASE_IMAGE: ${CAM_CORE_BASE:-nvcr.io/nvidia/l4t-base:r36.2.0}
    init: true                          # tini reaps orphans; the supervisor manages its children
    network_mode: ${CAM_NETWORK:-host} # GigE Vision broadcast discovery needs host networking
    ipc: host                           # publish /dev/shm so consumers can read the transport
    runtime: nvidia
    command: ["supervisor.py"]          # reads CAM_CONFIG; spawns core + in-image (process) plugins
    volumes:
      - ./core-driver/config:/app/config:ro
      # Recordings live OFF the repo when rig sets RIG_DATA_DIR (an absolute host data root, e.g. /data):
      # source+target both become $RIG_DATA_DIR so the path is identical host<->container AND `rig bake`
      # leaves it literal (an absolute path isn't relativized into the artifact). Dev (unset): ./recordings
      # -> /data/recordings. main.py roots the recording dir here + adds a per-sensor <CAM_INSTANCE> subdir.
      - ${RIG_DATA_DIR:-./recordings}:${RIG_DATA_DIR:-/data/recordings}
      - cam_sock:/tmp/cam
    environment:
      - CAM_CONFIG=${CAM_CONFIG:-config/sensors/camera.yaml}
      - RIG_DATA_DIR=${RIG_DATA_DIR:-}     # absolute host data root (rig) -> recording dir rooted here, off-repo
      - CAM_INSTANCE=${CAM_INSTANCE:-}     # sensor name (cam-up) -> main.py namespaces recordings per sensor
    healthcheck:
      # `rig status` (docker compose ps) then reports real health, not "n/a": the core reached
      # PLAYING and its shm transport socket exists (a stack that feeds consumers has one enabled).
      # frames = JP6 shm+header endpoint; unixfd = its JP7 replacement; raw = the optional headless shm.
      test: ["CMD-SHELL", "test -S /tmp/cam/frames || test -S /tmp/cam/unixfd || test -S /tmp/cam/raw"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 25s     # allow Aravis discovery + (optional) PTP lock wait + pipeline start
    restart: unless-stopped

volumes:
  cam_sock:
    external: true                      # created by cam-up so it has a stable cross-stack name
    name: ${CAM_SOCK_VOLUME:-cam_sock}
